{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>
        <p>Welcome back. Please enter your credentials.</p>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form action="{{ request.url_for('login_submit') }}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-register">Login</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ request.url_for('register_page') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
